<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Site temporariamente indisponível</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #8B0000, #000);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 30px;
      background: rgba(0,0,0,0.6);
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 15px;
      font-size: 28px;
      color: #ff4d4d;
    }

    p {
      font-size: 16px;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      padding: 12px 20px;
      background: #ff4d4d;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff1a1a;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>⚠️ Acesso temporariamente indisponível</h1>
    
    <p>
      Este site está temporariamente fora do ar devido a uma pendência.
      <br><br>
      Para mais informações, entre em contato com o responsável.
    </p>

    <a href="#" class="btn">Entrar em contato</a>

    <div class="footer">
      © 2026 - Todos os direitos reservados
    </div>
  </div>

</body>
</html>
